<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <title>Cyber Snake: Smartphone Version</title>
  <style>
    :root {
      --panel: #111827;
      --panel-2: #1f2937;
      --text: #f8fafc;
      --muted: #cbd5e1;
      --success: #16a34a;
      --danger: #dc2626;
      --info: #2563eb;
      --button: #334155;
      --bait1: #16a34a;
      --bait2: #dc2626;
      --bait3: #2563eb;
      --bait4: #d97706;
    }

    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      min-height: 100%;
      background: linear-gradient(180deg, #071226, #0f172a);
      color: var(--text);
      font-family: Arial, Helvetica, sans-serif;
      overscroll-behavior: none;
    }

    body {
      display: flex;
      justify-content: center;
      padding: 6px;
    }

    .app {
      width: 100%;
      max-width: 430px;
      display: grid;
      gap: 6px;
      align-content: start;
    }

    .card {
      background: rgba(17, 24, 39, 0.96);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 12px;
      padding: 8px;
      box-shadow: 0 6px 18px rgba(0,0,0,0.2);
    }

    .title {
      margin: 0 0 4px 0;
      font-size: 1rem;
      font-weight: 700;
    }

    .subtitle, .small {
      margin: 0;
      font-size: 0.78rem;
      color: var(--muted);
      line-height: 1.3;
    }

    .question-label {
      font-size: 0.68rem;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.04em;
      margin-bottom: 4px;
    }

    .question-text {
      font-size: 0.92rem;
      font-weight: 700;
      line-height: 1.3;
      min-height: 2.2em;
      margin-bottom: 6px;
    }

    .progress-line {
      font-size: 0.8rem;
      color: var(--muted);
      margin-bottom: 6px;
    }

    .feedback-box {
      min-height: 34px;
      border-radius: 10px;
      padding: 8px 10px;
      font-size: 0.8rem;
      line-height: 1.3;
      background: var(--panel-2);
      color: var(--text);
    }

    .feedback-box.correct { border-left: 4px solid #22c55e; }
    .feedback-box.wrong { border-left: 4px solid #ef4444; }
    .feedback-box.info { border-left: 4px solid #2563eb; }

    .canvas-wrap {
      display: flex;
      justify-content: center;
      align-items: center;
      position: relative;
    }

    canvas {
      background: #020617;
      border: 2px solid rgba(255,255,255,0.12);
      border-radius: 12px;
      width: 100%;
      max-width: 100%;
      height: auto;
      display: block;
      touch-action: none;
      user-select: none;
      -webkit-user-select: none;
      -webkit-tap-highlight-color: transparent;
    }

    .tap-hint {
      position: absolute;
      bottom: 8px;
      right: 8px;
      background: rgba(0,0,0,0.5);
      color: #fff;
      font-size: 0.68rem;
      padding: 4px 6px;
      border-radius: 8px;
      pointer-events: none;
    }

    .option-strip {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 6px;
      margin-top: 6px;
    }

    .option-pill {
      display: flex;
      align-items: center;
      gap: 6px;
      background: var(--panel-2);
      border-radius: 10px;
      padding: 6px 8px;
      min-height: 32px;
      overflow: hidden;
    }

    .swatch {
      width: 12px;
      height: 12px;
      border-radius: 3px;
      flex: 0 0 12px;
    }

    .option-pill span {
      font-size: 0.74rem;
      line-height: 1.2;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .actions {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 6px;
      margin-top: 6px;
    }

    .action-btn {
      border: none;
      border-radius: 10px;
      padding: 10px 8px;
      font-size: 0.9rem;
      font-weight: 700;
      color: white;
      background: var(--button);
      cursor: pointer;
      min-height: 42px;
      -webkit-tap-highlight-color: transparent;
      touch-action: manipulation;
    }

    .action-btn.start { background: var(--success); }
    .action-btn.pause { background: var(--info); }
    .action-btn.reset { background: var(--danger); }

    .footer-note {
      text-align: center;
      font-size: 0.72rem;
      color: var(--muted);
      padding-bottom: 2px;
    }

    @media (max-width: 380px) {
      .option-strip { grid-template-columns: 1fr; }
      .question-text { font-size: 0.88rem; }
    }
  </style>
</head>
<body>
  <div class="app">
    <section class="card">
      <h1 class="title">Cyber Snake</h1>
      <p class="subtitle">Smartphone version. Tap on the board to change snake direction. Wrap mode is always on.</p>
    </section>

    <section class="card">
      <div class="question-label">Question</div>
      <div class="question-text" id="questionText">Tap Start to begin.</div>
      <div class="progress-line" id="progressLine">Question progress will appear here.</div>
      <div class="feedback-box info" id="feedbackBox">Tap the board above, below, left, or right to control the snake.</div>
    </section>

    <section class="card">
      <div class="canvas-wrap">
        <canvas id="gameCanvas" width="340" height="340"></canvas>
        <div class="tap-hint">Tap board to turn</div>
      </div>
      <div class="option-strip" id="optionStrip"></div>
      <div class="actions">
        <button class="action-btn start" id="startBtn">Start</button>
        <button class="action-btn pause" id="pauseBtn">Pause</button>
        <button class="action-btn reset" id="resetBtn">Restart</button>
      </div>
    </section>

    <p class="footer-note">Score is shown at the end only.</p>
  </div>

  <script>
    const GRID_SIZE = 10;
    const SPEED = 280;
    const BAIT_COLORS = ['#16a34a','#dc2626','#2563eb','#d97706'];

    const QUESTIONS = [
      {q:'Cyber stalking?', o:['Harass','Track','Copy','Block'], a:'Harass'},
      {q:'Phishing use?', o:['Steal','Speed','Fix','Encrypt'], a:'Steal'},
      {q:'Piracy?', o:['Legal','Copy','Install','Encrypt'], a:'Copy'},
      {q:'Hacking?', o:['Access','Mail','Delete','Browse'], a:'Access'},
      {q:'Spamming?', o:['Bulk msg','Encrypt','Block','Repair'], a:'Bulk msg'},
      {q:'DoS attack?', o:['Crash','Improve','Secure','Backup'], a:'Crash'},
      {q:'Salami attack?', o:['Small cuts','Big theft','Mail','Hack'], a:'Small cuts'},
      {q:'Data diddling?', o:['Change','Delete','Encrypt','Spam'], a:'Change'},
      {q:'Spoofing?', o:['Fake id','Block','Delete','Encrypt'], a:'Fake id'},
      {q:'Auction fraud?', o:['Fake sale','Safe','Secure','Fast'], a:'Fake sale'},
      {q:'Cyber squatting?', o:['Domain','Hack','Spam','Block'], a:'Domain'},
      {q:'Malware?', o:['Harm','Help','Fix','Scan'], a:'Harm'},
      {q:'Ransomware?', o:['Demand','Share','Delete','Hide'], a:'Demand'},
      {q:'Identity theft?', o:['Impersonate','Scan','Block','Fix'], a:'Impersonate'},
      {q:'Keylogger?', o:['Record','Delete','Encrypt','Scan'], a:'Record'},
      {q:'Trojan?', o:['Hidden','Fast','Clean','Block'], a:'Hidden'},
      {q:'Worm?', o:['Spread','Stop','Scan','Fix'], a:'Spread'},
      {q:'Virus?', o:['Infect','Clean','Block','Delete'], a:'Infect'}
    ];

    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const questionText = document.getElementById('questionText');
    const feedbackBox = document.getElementById('feedbackBox');
    const progressLine = document.getElementById('progressLine');
    const optionStrip = document.getElementById('optionStrip');
    const startBtn = document.getElementById('startBtn');
    const pauseBtn = document.getElementById('pauseBtn');
    const resetBtn = document.getElementById('resetBtn');

    let CELL;
    let snake = [];
    let dir = {x:1,y:0};
    let nextDir = {x:1,y:0};
    let baits = [];
    let current = null;
    let idx = 0;
    let running = false;
    let paused = false;
    let timer = null;
    let score = 0;
    let correct = 0;
    let gameStarted = false;

    function resize() {
      const maxWidth = Math.min(window.innerWidth - 20, 420);
      const size = Math.max(280, maxWidth - 4);
      canvas.width = size;
      canvas.height = size;
      CELL = size / GRID_SIZE;
      draw();
    }

    function stopTimer() {
      if (timer) {
        clearInterval(timer);
        timer = null;
      }
    }

    function feedback(type, text) {
      feedbackBox.className = `feedback-box ${type}`;
      feedbackBox.textContent = text;
    }

    function resetState() {
      stopTimer();
      snake = [{x:4,y:4}];
      dir = {x:1,y:0};
      nextDir = {x:1,y:0};
      baits = [];
      current = null;
      idx = 0;
      running = false;
      paused = false;
      score = 0;
      correct = 0;
      gameStarted = false;
      questionText.textContent = 'Tap Start to begin.';
      progressLine.textContent = 'Question progress will appear here.';
      optionStrip.innerHTML = '';
      feedback('info', 'Tap the board above, below, left, or right to control the snake.');
      pauseBtn.textContent = 'Pause';
      draw();
    }

    function startGame() {
      if (!gameStarted) {
        snake = [{x:4,y:4}];
        dir = {x:1,y:0};
        nextDir = {x:1,y:0};
        idx = 0;
        score = 0;
        correct = 0;
        gameStarted = true;
        nextQuestion();
      }
      running = true;
      paused = false;
      pauseBtn.textContent = 'Pause';
      stopTimer();
      timer = setInterval(step, SPEED);
      draw();
    }

    function pauseGame() {
      if (!gameStarted) return;
      paused = !paused;
      running = !paused;
      pauseBtn.textContent = paused ? 'Resume' : 'Pause';
    }

    function nextQuestion() {
      current = QUESTIONS[idx % QUESTIONS.length];
      idx += 1;
      questionText.textContent = current.q;
      progressLine.textContent = `Question: ${idx}   Length: ${snake.length}   Correct: ${correct}`;
      placeBaits();
      renderOptionStrip();
      feedback('info', 'Move the snake to the correct coloured bait.');
      draw();
    }

    function placeBaits() {
      baits = [];
      const used = new Set(snake.map(s => `${s.x},${s.y}`));
      current.o.forEach((opt, i) => {
        let x, y, key;
        do {
          x = Math.floor(Math.random() * GRID_SIZE);
          y = Math.floor(Math.random() * GRID_SIZE);
          key = `${x},${y}`;
        } while (used.has(key));
        used.add(key);
        baits.push({
          x, y,
          opt,
          correct: opt === current.a,
          color: BAIT_COLORS[i],
          label: String.fromCharCode(65 + i)
        });
      });
    }

    function renderOptionStrip() {
      optionStrip.innerHTML = '';
      baits.forEach(b => {
        const div = document.createElement('div');
        div.className = 'option-pill';
        div.innerHTML = `<span class="swatch" style="background:${b.color}"></span><span><strong>${b.label}</strong>: ${b.opt}</span>`;
        optionStrip.appendChild(div);
      });
    }

    function step() {
      if (!running || paused || !gameStarted) return;

      dir = nextDir;
      const head = {x: snake[0].x + dir.x, y: snake[0].y + dir.y};

      if (head.x < 0) head.x = GRID_SIZE - 1;
      if (head.x >= GRID_SIZE) head.x = 0;
      if (head.y < 0) head.y = GRID_SIZE - 1;
      if (head.y >= GRID_SIZE) head.y = 0;

      if (snake.some(s => s.x === head.x && s.y === head.y)) {
        endGame();
        return;
      }

      const hit = baits.find(b => b.x === head.x && b.y === head.y);
      if (hit) {
        if (hit.correct) {
          snake.unshift(head);
          score += 10;
          correct += 1;
          feedback('correct', 'Correct');
          nextQuestion();
          return;
        } else {
          feedback('wrong', 'Try again');
          draw();
          return;
        }
      }

      snake.unshift(head);
      snake.pop();
      draw();
    }

    function endGame() {
      running = false;
      paused = false;
      gameStarted = false;
      stopTimer();
      feedback('wrong', 'Game Over');
      draw();
      setTimeout(() => {
        alert(`Game Over\nFinal Score: ${score}\nCorrect Answers: ${correct}\nFinal Length: ${snake.length}`);
      }, 120);
    }

    function drawRoundedCell(x, y, color) {
      const px = x * CELL;
      const py = y * CELL;
      ctx.fillStyle = color;
      ctx.fillRect(px + 1.5, py + 1.5, CELL - 3, CELL - 3);
    }

    function draw() {
      if (!ctx || !CELL) return;
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      ctx.fillStyle = '#020617';
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      for (let i = 0; i < GRID_SIZE; i++) {
        for (let j = 0; j < GRID_SIZE; j++) {
          ctx.strokeStyle = 'rgba(255,255,255,0.05)';
          ctx.strokeRect(i * CELL, j * CELL, CELL, CELL);
        }
      }

      baits.forEach(b => {
        drawRoundedCell(b.x, b.y, b.color);
        ctx.fillStyle = '#ffffff';
        ctx.textAlign = 'center';
        ctx.font = `bold ${Math.max(11, CELL * 0.28)}px Arial`;
        ctx.fillText(b.label, b.x * CELL + CELL / 2, b.y * CELL + CELL / 2 - 3);
        ctx.font = `${Math.max(8, CELL * 0.18)}px Arial`;
        ctx.fillText(b.opt, b.x * CELL + CELL / 2, b.y * CELL + CELL / 2 + 10);
      });

      snake.forEach((s, i) => {
        drawRoundedCell(s.x, s.y, i === 0 ? '#38bdf8' : '#60a5fa');
      });
    }

    function setDirectionFromTap(clientX, clientY) {
      const rect = canvas.getBoundingClientRect();
      const x = clientX - rect.left;
      const y = clientY - rect.top;
      const centerX = rect.width / 2;
      const centerY = rect.height / 2;
      const dx = x - centerX;
      const dy = y - centerY;

      let nd;
      if (Math.abs(dx) > Math.abs(dy)) {
        nd = dx > 0 ? {x:1,y:0} : {x:-1,y:0};
      } else {
        nd = dy > 0 ? {x:0,y:1} : {x:0,y:-1};
      }

      if (snake.length > 1 && nd.x === -dir.x && nd.y === -dir.y) return;
      nextDir = nd;
    }

    startBtn.addEventListener('click', startGame);
    startBtn.addEventListener('touchstart', (e) => { e.preventDefault(); startGame(); }, { passive: false });
    pauseBtn.addEventListener('click', pauseGame);
    pauseBtn.addEventListener('touchstart', (e) => { e.preventDefault(); pauseGame(); }, { passive: false });
    resetBtn.addEventListener('click', resetState);
    resetBtn.addEventListener('touchstart', (e) => { e.preventDefault(); resetState(); }, { passive: false });

    canvas.addEventListener('click', (e) => {
      setDirectionFromTap(e.clientX, e.clientY);
    });

    canvas.addEventListener('touchstart', (e) => {
      e.preventDefault();
      const t = e.changedTouches[0];
      setDirectionFromTap(t.clientX, t.clientY);
    }, { passive: false });

    canvas.addEventListener('touchmove', (e) => {
      e.preventDefault();
    }, { passive: false });

    window.addEventListener('resize', resize);
    resize();
    resetState();
  </script>
</body>
</html>
