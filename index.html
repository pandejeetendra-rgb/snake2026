<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <title>Cyber Snake: Smartphone Version</title>
  <style>
    :root {
      --panel: #111827;
      --panel-2: #1f2937;
      --text: #f8fafc;
      --muted: #cbd5e1;
      --success: #16a34a;
      --danger: #dc2626;
      --info: #2563eb;
      --button: #334155;
      --bait1: #16a34a;
      --bait2: #dc2626;
      --bait3: #2563eb;
      --bait4: #d97706;
    }

    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      min-height: 100%;
      background: linear-gradient(180deg, #071226, #0f172a);
      color: var(--text);
      font-family: Arial, Helvetica, sans-serif;
      overscroll-behavior: none;
    }

    body {
      display: flex;
      justify-content: center;
      padding: 6px;
    }

    .app {
      width: 100%;
      max-width: 430px;
      display: grid;
      gap: 6px;
      align-content: start;
    }

    .card {
      background: rgba(17, 24, 39, 0.96);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 12px;
      padding: 8px;
      box-shadow: 0 6px 18px rgba(0,0,0,0.2);
    }

    .title {
      margin: 0 0 4px 0;
      font-size: 1rem;
      font-weight: 700;
    }

    .subtitle, .small {
      margin: 0;
      font-size: 0.78rem;
      color: var(--muted);
      line-height: 1.3;
    }

    .question-label {
      font-size: 0.68rem;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.04em;
      margin-bottom: 4px;
    }

    .question-text {
      font-size: 0.92rem;
      font-weight: 700;
      line-height: 1.3;
      min-height: 2.2em;
      margin-bottom: 6px;
    }

    .progress-line {
      font-size: 0.8rem;
      color: var(--muted);
      margin-bottom: 6px;
    }

    .feedback-box {
      min-height: 34px;
      border-radius: 10px;
      padding: 8px 10px;
      font-size: 0.8rem;
      line-height: 1.3;
      background: var(--panel-2);
      color: var(--text);
    }

    .feedback-box.correct { border-left: 4px solid #22c55e; }
    .feedback-box.wrong { border-left: 4px solid #ef4444; }
    .feedback-box.info { border-left: 4px solid #2563eb; }

    .canvas-wrap {
      display: flex;
      justify-content: center;
      align-items: center;
      position: relative;
    }

    canvas {
      background: #020617;
      border: 2px solid rgba(255,255,255,0.12);
      border-radius: 12px;
      width: 100%;
      max-width: 100%;
      height: auto;
      display: block;
      user-select: none;
      -webkit-user-select: none;
      -webkit-tap-highlight-color: transparent;
      touch-action: none;
    }

    .tap-hint {
      position: absolute;
      bottom: 8px;
      right: 8px;
      background: rgba(0,0,0,0.5);
      color: #fff;
      font-size: 0.68rem;
      padding: 4px 6px;
      border-radius: 8px;
      pointer-events: none;
    }

    .option-strip {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 6px;
      margin-top: 6px;
    }

    .option-pill {
      display: flex;
      align-items: flex-start;
      gap: 6px;
      background: var(--panel-2);
      border-radius: 10px;
      padding: 8px;
      min-height: 42px;
      overflow: hidden;
      border: 1px solid transparent;
      cursor: pointer;
      color: var(--text);
      font: inherit;
      text-align: left;
      width: 100%;
    }

    .option-pill.selected {
      border-color: rgba(255,255,255,0.5);
      box-shadow: inset 0 0 0 1px rgba(255,255,255,0.2);
    }

    .option-pill:disabled {
      opacity: 0.72;
      cursor: not-allowed;
    }

    .swatch {
      width: 12px;
      height: 12px;
      border-radius: 3px;
      flex: 0 0 12px;
      margin-top: 2px;
    }

    .option-pill span {
      font-size: 0.74rem;
      line-height: 1.25;
      white-space: normal;
      overflow: hidden;
    }

    .actions {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 6px;
      margin-top: 6px;
    }

    .action-btn {
      border: none;
      border-radius: 10px;
      padding: 10px 8px;
      font-size: 0.9rem;
      font-weight: 700;
      color: white;
      background: var(--button);
      cursor: pointer;
      min-height: 42px;
      -webkit-tap-highlight-color: transparent;
      touch-action: manipulation;
    }

    .action-btn.start { background: var(--success); }
    .action-btn.pause { background: var(--info); }
    .action-btn.reset { background: var(--danger); }

    .footer-note {
      text-align: center;
      font-size: 0.72rem;
      color: var(--muted);
      padding-bottom: 2px;
    }

    @media (max-width: 380px) {
      .option-strip { grid-template-columns: 1fr; }
      .question-text { font-size: 0.88rem; }
    }
  </style>
</head>
<body>
  <div class="app">
    <section class="card">
      <h1 class="title">Cyber Snake</h1>
      <p class="subtitle">Tap an option below the board. The snake will automatically follow the path to the matching bait on the board. Wrap mode is always on.</p>
    </section>

    <section class="card">
      <div class="question-label">Question</div>
      <div class="question-text" id="questionText">Tap Start to begin.</div>
      <div class="progress-line" id="progressLine">Question progress will appear here.</div>
      <div class="feedback-box info" id="feedbackBox">Tap one option below the board.</div>
    </section>

    <section class="card">
      <div class="canvas-wrap">
        <canvas id="gameCanvas" width="340" height="340"></canvas>
        <div class="tap-hint">Snake auto-moves</div>
      </div>
      <div class="option-strip" id="optionStrip"></div>
      <div class="actions">
        <button class="action-btn start" id="startBtn">Start</button>
        <button class="action-btn pause" id="pauseBtn">Pause</button>
        <button class="action-btn reset" id="resetBtn">Restart</button>
      </div>
    </section>

    <p class="footer-note">Score is shown at the end only.</p>
  </div>

  <script>
    const GRID_SIZE = 16;
    const STEP_SPEED = 220;
    const BAIT_COLORS = ['#16a34a','#dc2626','#2563eb','#d97706'];
    const QUESTIONS_PER_GAME = 10;

    const QUESTIONS = [
      {q:'What is cyber stalking?', o:['A person is harassed online','Network speed is monitored','Software is copied illegally','A website is blocked'], a:'A person is harassed online'},
      {q:'Phishing is mainly used to:', o:['Steal sensitive information','Improve internet speed','Repair system files','Encrypt all folders'], a:'Steal sensitive information'},
      {q:'Software piracy means:', o:['Copying software illegally','Using free software legally','Installing antivirus','Updating licensed software'], a:'Copying software illegally'},
      {q:'Hacking means:', o:['Unauthorized access to a system','Sending bulk email','Deleting cookies only','Browsing privately'], a:'Unauthorized access to a system'},
      {q:'Spamming refers to:', o:['Sending unwanted bulk messages','Encrypting email contents','Blocking websites remotely','Repairing computers'], a:'Sending unwanted bulk messages'},
      {q:'A DoS attack tries to:', o:['Overload a service','Improve bandwidth','Secure user data','Create backups'], a:'Overload a service'},
      {q:'A salami attack uses:', o:['Small hidden thefts','One large theft','Only email hacking','Only password cracking'], a:'Small hidden thefts'},
      {q:'Data diddling means:', o:['Changing data before processing','Deleting all files','Encrypting a database','Sending spam mail'], a:'Changing data before processing'},
      {q:'Email spoofing means:', o:['Using a fake sender identity','Deleting old emails','Blocking inbox access','Compressing attachments'], a:'Using a fake sender identity'},
      {q:'Online auction fraud means:', o:['Fake sale or no delivery','Guaranteed safe sale','Fast delivery only','Secure payment gateway'], a:'Fake sale or no delivery'},
      {q:'Cyber squatting means:', o:['Registering domains for resale','Hacking web servers','Sending spam ads','Blocking web pages'], a:'Registering domains for resale'},
      {q:'Malware is designed to:', o:['Harm a computer system','Improve computer speed','Repair software bugs','Save battery power'], a:'Harm a computer system'},
      {q:'Ransomware is used to:', o:['Demand money from the victim','Share free software','Delete search history','Hide desktop icons'], a:'Demand money from the victim'},
      {q:'Identity theft means:', o:['Pretending to be another person','Scanning a hard disk','Blocking an email account','Fixing system files'], a:'Pretending to be another person'},
      {q:'A keylogger is used to:', o:['Record key presses','Delete text files','Encrypt passwords safely','Scan internet speed'], a:'Record key presses'},
      {q:'A Trojan horse is:', o:['A hidden harmful program','A fast antivirus tool','A safe browser plug-in','A firewall setting'], a:'A hidden harmful program'},
      {q:'A computer worm can:', o:['Spread automatically','Improve system speed','Block advertisements','Recover deleted files'], a:'Spread automatically'},
      {q:'A virus usually needs:', o:['User action to run','A printer to spread','A firewall to grow','A scanner to start'], a:'User action to run'},
      {q:'Spyware is used to:', o:['Secretly collect information','Increase battery life','Clean infected files','Protect passwords'], a:'Secretly collect information'},
      {q:'Adware mainly shows:', o:['Unwanted advertisements','Security warnings only','System passwords','Backup reports'], a:'Unwanted advertisements'},
      {q:'Browser hijacking does what?', o:['Changes browser settings','Repairs web pages','Encrypts browser cache','Deletes bookmarks'], a:'Changes browser settings'},
      {q:'Scareware tries to:', o:['Frighten users into paying','Increase computer memory','Block search engines','Improve antivirus'], a:'Frighten users into paying'},
      {q:'Cyber terrorism targets:', o:['Political or social systems','Only home printers','Only games and apps','Only offline files'], a:'Political or social systems'},
      {q:'Forgery in cyber crime means:', o:['Creating fake documents','Improving digital signatures','Backing up records','Repairing a website'], a:'Creating fake documents'},
      {q:'IPR crime includes:', o:['Illegal movie or software download','Safe password creation','Network monitoring','Cloud backup only'], a:'Illegal movie or software download'},
      {q:'A white hat hacker is:', o:['An ethical hacker','A ransomware attacker','A spammer','A website vandal'], a:'An ethical hacker'},
      {q:'A black hat hacker is:', o:['A malicious hacker','A security auditor','A help desk worker','A network trainer'], a:'A malicious hacker'},
      {q:'A grey hat hacker usually:', o:['Finds flaws and asks fee','Only deletes files','Spreads worms','Builds antivirus'], a:'Finds flaws and asks fee'},
      {q:'A blue hat hacker is used to:', o:['Test a system before launch','Sell domain names','Send phishing mail','Create pop-up ads'], a:'Test a system before launch'},
      {q:'Computer vandalism means:', o:['Damaging computing resources','Improving server speed','Cleaning temporary files','Organizing folders'], a:'Damaging computing resources'},
      {q:'Cross-site scripting involves:', o:['Injecting malicious script','Deleting browser history','Blocking a router','Formatting a hard disk'], a:'Injecting malicious script'},
      {q:'Web jacking means:', o:['Taking control of a website','Buying legal domains','Improving web design','Compressing a webpage'], a:'Taking control of a website'},
      {q:'Internet time theft means:', o:['Using someone else’s ISP access','Downloading large videos','Blocking Wi-Fi signals','Improving broadband'], a:'Using someone else’s ISP access'},
      {q:'Child pornography crime involves:', o:['Illegal sexual images of minors','Movie piracy only','Website defacement','Email spoofing'], a:'Illegal sexual images of minors'},
      {q:'Cyber crime is often done for:', o:['Money, revenge or fun','Only academic research','Only system testing','Only free access'], a:'Money, revenge or fun'},
      {q:'An insider attack is done by:', o:['A person with authorized access','An unknown outsider only','An ISP technician only','A search engine bot'], a:'A person with authorized access'},
      {q:'An external attack is done by:', o:['Someone outside the organization','Only the HR department','Only internal auditors','Only database admins'], a:'Someone outside the organization'},
      {q:'An unstructured attack is usually by:', o:['An amateur attacker','A trained cyber unit','A legal investigator','A certified auditor'], a:'An amateur attacker'},
      {q:'A structured attack is usually by:', o:['A skilled attacker with clear motive','A child learning computers','A casual gamer','A simple office user'], a:'A skilled attacker with clear motive'},
      {q:'Adware usually does what?', o:['Shows forced ads','Encrypts hard drives','Deletes backups','Creates strong passwords'], a:'Shows forced ads'},
      {q:'Spyware often tries to:', o:['Gather user information','Speed up browsers','Protect cookies','Remove malware'], a:'Gather user information'},
      {q:'A botnet is:', o:['A group of infected devices','A backup network only','A legal firewall','A safe email tool'], a:'A group of infected devices'},
      {q:'Vishing uses which medium?', o:['Voice call','Printed letter','USB drive','Firewall log'], a:'Voice call'},
      {q:'Smishing uses which medium?', o:['SMS text','Video file','Printer alert','BIOS screen'], a:'SMS text'},
      {q:'Computer crime became more harmful after:', o:['Public internet expansion','Better printers arrived','Cables got shorter','Hard disks became cheaper'], a:'Public internet expansion'},
      {q:'An IDS helps to:', o:['Detect suspicious activity','Increase monitor size','Store passwords','Format a disk'], a:'Detect suspicious activity'},
      {q:'Revenge as a cyber crime motive means:', o:['Trying to harm others digitally','Trying to upgrade software','Improving internet plans','Reducing website traffic cost'], a:'Trying to harm others digitally'},
      {q:'Recognition as a motive means:', o:['Wanting status for hacking','Wanting new hardware','Buying legal software','Watching online classes'], a:'Wanting status for hacking'},
      {q:'Anonymity in cyber space may:', o:['Encourage cyber crime','Stop all phishing','Repair damaged files','Block websites safely'], a:'Encourage cyber crime'}
    ];

    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const questionText = document.getElementById('questionText');
    const feedbackBox = document.getElementById('feedbackBox');
    const progressLine = document.getElementById('progressLine');
    const optionStrip = document.getElementById('optionStrip');
    const startBtn = document.getElementById('startBtn');
    const pauseBtn = document.getElementById('pauseBtn');
    const resetBtn = document.getElementById('resetBtn');

    let CELL;
    let snake = [];
    let baits = [];
    let current = null;
    let idx = 0;
    let score = 0;
    let correct = 0;
    let gameStarted = false;
    let paused = false;
    let moving = false;
    let autoPath = [];
    let timer = null;
    let selectedLabel = null;
    let questionDeck = [];

    function shuffle(array) {
      const a = [...array];
      for (let i = a.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [a[i], a[j]] = [a[j], a[i]];
      }
      return a;
    }

    function resize() {
      const maxWidth = Math.min(window.innerWidth - 20, 420);
      const size = Math.max(280, maxWidth - 4);
      canvas.width = size;
      canvas.height = size;
      CELL = size / GRID_SIZE;
      draw();
    }

    function stopTimer() {
      if (timer) {
        clearInterval(timer);
        timer = null;
      }
    }

    function feedback(type, text) {
      feedbackBox.className = `feedback-box ${type}`;
      feedbackBox.textContent = text;
    }

    function resetState() {
      stopTimer();
      snake = [{x:6,y:6}];
      baits = [];
      current = null;
      idx = 0;
      score = 0;
      correct = 0;
      gameStarted = false;
      paused = false;
      moving = false;
      autoPath = [];
      selectedLabel = null;
      questionDeck = shuffle([...QUESTIONS]).slice(0, QUESTIONS_PER_GAME);
      questionText.textContent = 'Tap Start to begin.';
      progressLine.textContent = 'Question progress will appear here.';
      optionStrip.innerHTML = '';
      feedback('info', 'Tap one option below the board.');
      pauseBtn.textContent = 'Pause';
      draw();
    }

    function startGame() {
      if (!gameStarted) {
        snake = [{x:6,y:6}];
        idx = 0;
        score = 0;
        correct = 0;
        questionDeck = shuffle([...QUESTIONS]).slice(0, QUESTIONS_PER_GAME);
        gameStarted = true;
        paused = false;
        moving = false;
        autoPath = [];
        selectedLabel = null;
        nextQuestion();
      } else if (paused) {
        paused = false;
        pauseBtn.textContent = 'Pause';
      }
      draw();
    }

    function pauseGame() {
      if (!gameStarted) return;
      paused = !paused;
      pauseBtn.textContent = paused ? 'Resume' : 'Pause';
    }

    function nextQuestion() {
      if (!questionDeck.length) {
        endGame();
        return;
      }
      current = questionDeck.shift();
      idx += 1;
      questionText.textContent = current.q;
      progressLine.textContent = `Question: ${idx}/${QUESTIONS_PER_GAME}   Length: ${snake.length}   Correct: ${correct}`;
      placeBaits();
      renderOptionStrip();
      moving = false;
      autoPath = [];
      selectedLabel = null;
      feedback('info', 'Tap one option below the board.');
      draw();
    }

    function placeBaits() {
      baits = [];
      const used = new Set(snake.map(s => `${s.x},${s.y}`));
      const shuffledOptions = shuffle(current.o.map(opt => ({ opt, correct: opt === current.a })));
      shuffledOptions.forEach((item, i) => {
        let x, y, key;
        do {
          x = Math.floor(Math.random() * GRID_SIZE);
          y = Math.floor(Math.random() * GRID_SIZE);
          key = `${x},${y}`;
        } while (used.has(key));
        used.add(key);
        baits.push({
          x, y,
          opt: item.opt,
          correct: item.correct,
          color: BAIT_COLORS[i],
          label: String.fromCharCode(65 + i)
        });
      });
    }

    function renderOptionStrip() {
      optionStrip.innerHTML = '';
      baits.forEach(b => {
        const btn = document.createElement('button');
        btn.type = 'button';
        btn.className = 'option-pill';
        btn.dataset.label = b.label;
        btn.innerHTML = `<span class="swatch" style="background:${b.color}"></span><span><strong>${b.label}</strong>: ${b.opt}</span>`;
        btn.addEventListener('click', () => handleOptionTap(b));
        btn.addEventListener('touchstart', (e) => { e.preventDefault(); handleOptionTap(b); }, { passive: false });
        optionStrip.appendChild(btn);
      });
    }

    function setOptionButtonsDisabled(disabled) {
      optionStrip.querySelectorAll('.option-pill').forEach(btn => {
        btn.disabled = disabled;
      });
    }

    function highlightSelected(label) {
      optionStrip.querySelectorAll('.option-pill').forEach(btn => {
        btn.classList.toggle('selected', btn.dataset.label === label);
      });
    }

    function neighbors(node, blocked) {
      return [
        {x:(node.x + 1) % GRID_SIZE, y:node.y},
        {x:(node.x - 1 + GRID_SIZE) % GRID_SIZE, y:node.y},
        {x:node.x, y:(node.y + 1) % GRID_SIZE},
        {x:node.x, y:(node.y - 1 + GRID_SIZE) % GRID_SIZE}
      ].filter(n => !blocked.has(`${n.x},${n.y}`));
    }

    function findPath(start, target) {
      const blocked = new Set(snake.slice(0, -1).map(s => `${s.x},${s.y}`));
      blocked.delete(`${target.x},${target.y}`);
      const queue = [start];
      const came = new Map();
      const seen = new Set([`${start.x},${start.y}`]);

      while (queue.length) {
        const node = queue.shift();
        if (node.x === target.x && node.y === target.y) {
          const path = [];
          let key = `${node.x},${node.y}`;
          while (came.has(key)) {
            const cur = key.split(',').map(Number);
            path.unshift({x:cur[0], y:cur[1]});
            key = came.get(key);
          }
          return path;
        }
        for (const n of neighbors(node, blocked)) {
          const nk = `${n.x},${n.y}`;
          if (seen.has(nk)) continue;
          seen.add(nk);
          came.set(nk, `${node.x},${node.y}`);
          queue.push(n);
        }
      }
      return [];
    }

    function handleOptionTap(bait) {
      if (!gameStarted || paused || moving) return;
      const start = {x: snake[0].x, y: snake[0].y};
      const path = findPath(start, bait);
      if (!path.length) {
        feedback('wrong', 'No path available to this option. Try another one.');
        return;
      }
      autoPath = path;
      moving = true;
      selectedLabel = bait.label;
      highlightSelected(bait.label);
      setOptionButtonsDisabled(true);
      feedback('info', `Moving to ${bait.label}...`);
      stopTimer();
      timer = setInterval(stepAutoMove, STEP_SPEED);
      draw();
    }

    function stepAutoMove() {
      if (paused || !moving) return;
      if (!autoPath.length) {
        moving = false;
        stopTimer();
        setOptionButtonsDisabled(false);
        return;
      }

      const nextStep = autoPath.shift();
      const hit = baits.find(b => b.x === nextStep.x && b.y === nextStep.y);

      if (snake.some(s => s.x === nextStep.x && s.y === nextStep.y)) {
        endGame();
        return;
      }

      if (hit) {
        if (hit.correct) {
          snake.unshift(nextStep);
          score += 10;
          correct += 1;
          moving = false;
          stopTimer();
          setOptionButtonsDisabled(false);
          feedback('correct', 'Correct');
          nextQuestion();
          return;
        } else {
          moving = false;
          stopTimer();
          setOptionButtonsDisabled(false);
          highlightSelected(null);
          feedback('wrong', 'Try again');
          draw();
          return;
        }
      }

      snake.unshift(nextStep);
      snake.pop();
      draw();
    }

    function endGame() {
      moving = false;
      paused = false;
      gameStarted = false;
      stopTimer();
      setOptionButtonsDisabled(false);
      highlightSelected(null);
      feedback('wrong', 'Game Over');
      draw();
      setTimeout(() => {
        alert(`Game Over\nFinal Score: ${score}\nCorrect Answers: ${correct}/${QUESTIONS_PER_GAME}\nFinal Length: ${snake.length}`);
      }, 120);
    }

    function drawRoundedCell(x, y, color) {
      const px = x * CELL;
      const py = y * CELL;
      ctx.fillStyle = color;
      ctx.fillRect(px + 1.5, py + 1.5, CELL - 3, CELL - 3);
    }

    function draw() {
      if (!ctx || !CELL) return;
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      ctx.fillStyle = '#020617';
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      for (let i = 0; i < GRID_SIZE; i++) {
        for (let j = 0; j < GRID_SIZE; j++) {
          ctx.strokeStyle = 'rgba(255,255,255,0.05)';
          ctx.strokeRect(i * CELL, j * CELL, CELL, CELL);
        }
      }

      baits.forEach(b => {
        drawRoundedCell(b.x, b.y, b.color);
        ctx.fillStyle = '#ffffff';
        ctx.textAlign = 'center';
        ctx.font = `bold ${Math.max(14, CELL * 0.32)}px Arial`;
        ctx.fillText(b.label, b.x * CELL + CELL / 2, b.y * CELL + CELL / 2 + 5);
      });

      snake.forEach((s, i) => {
        drawRoundedCell(s.x, s.y, i === 0 ? '#38bdf8' : '#60a5fa');
      });
    }

    startBtn.addEventListener('click', startGame);
    startBtn.addEventListener('touchstart', (e) => { e.preventDefault(); startGame(); }, { passive: false });
    pauseBtn.addEventListener('click', pauseGame);
    pauseBtn.addEventListener('touchstart', (e) => { e.preventDefault(); pauseGame(); }, { passive: false });
    resetBtn.addEventListener('click', resetState);
    resetBtn.addEventListener('touchstart', (e) => { e.preventDefault(); resetState(); }, { passive: false });

    window.addEventListener('resize', resize);
    resize();
    resetState();
  </script>
</body>
</html>
