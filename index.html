<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <title>Cyber Snake: Types of Cyber Crime</title>
  <style>
    :root {
      --panel: #111827;
      --panel-2: #1f2937;
      --text: #f8fafc;
      --muted: #cbd5e1;
      --success: #16a34a;
      --danger: #dc2626;
      --info: #2563eb;
      --button: #334155;
      --bait1: #16a34a; /* A */
      --bait2: #dc2626; /* B */
      --bait3: #2563eb; /* C */
      --bait4: #d97706; /* D */
    }

    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      min-height: 100%;
      overscroll-behavior: none;
      touch-action: manipulation;
      background: linear-gradient(180deg, #071226, #0f172a);
      color: var(--text);
      font-family: Arial, Helvetica, sans-serif;
    }

    body {
      display: flex;
      justify-content: center;
      padding: 8px;
    }

    .app {
      width: 100%;
      max-width: 460px;
      display: grid;
      gap: 8px;
      align-content: start;
    }

    .card {
      background: rgba(17, 24, 39, 0.96);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 14px;
      padding: 10px;
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.22);
    }

    .title {
      font-size: 1.05rem;
      font-weight: 700;
      margin-bottom: 4px;
    }

    .subtitle, .small {
      font-size: 0.8rem;
      color: var(--muted);
      line-height: 1.35;
    }

    .question-card {
      display: grid;
      gap: 6px;
    }

    .question-label {
      font-size: 0.72rem;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }

    .question-text {
      font-size: 0.95rem;
      font-weight: 700;
      line-height: 1.35;
      min-height: 2.6em;
    }

    .progress-line {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      font-size: 0.82rem;
      color: var(--muted);
    }

    .canvas-wrap {
      display: flex;
      justify-content: center;
      align-items: center;
    }

    canvas {
      background: #020617;
      border: 2px solid rgba(255,255,255,0.12);
      border-radius: 12px;
      width: 100%;
      max-width: 100%;
      height: auto;
      display: block;
      touch-action: none;
      -webkit-user-select: none;
      user-select: none;
    }

    .feedback-box {
      min-height: 38px;
      border-radius: 10px;
      padding: 9px 10px;
      font-size: 0.82rem;
      line-height: 1.35;
      background: var(--panel-2);
      color: var(--text);
    }

    .feedback-box.correct { border-left: 4px solid #22c55e; }
    .feedback-box.wrong { border-left: 4px solid #ef4444; }
    .feedback-box.info { border-left: 4px solid #2563eb; }

    .actions {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 6px;
    }

    .controls-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 6px;
      max-width: 210px;
      margin: 0 auto;
      user-select: none;
    }

    .ctrl-empty { visibility: hidden; }

    .ctrl-btn, .action-btn {
      border: none;
      border-radius: 12px;
      padding: 10px 8px;
      font-size: 0.92rem;
      font-weight: 700;
      color: white;
      background: var(--button);
      cursor: pointer;
      min-height: 44px;
      -webkit-tap-highlight-color: transparent;
      touch-action: manipulation;
    }

    .action-btn.start { background: var(--success); }
    .action-btn.pause { background: var(--info); }
    .action-btn.reset { background: var(--danger); }

    .footer-note {
      text-align: center;
      font-size: 0.74rem;
      color: var(--muted);
      padding-bottom: 4px;
    }

    @media (max-width: 380px) {
      .question-text { font-size: 0.9rem; }
    }
  </style>
</head>
<body>
  <div class="app">
    <section class="card">
      <h1 class="title">Cyber Snake</h1>
      <p class="subtitle">Guide the snake to the correct coloured bait. Short options are shown directly on the board.</p>
    </section>

    <section class="card question-card">
      <div class="question-label">Question</div>
      <div class="question-text" id="questionText">Tap Start to begin.</div>
      <div class="progress-line" id="progressLine"></div>
      <div class="feedback-box info" id="feedbackBox">Select the correct bait.</div>
    </section>

    <section class="card">
      <div class="canvas-wrap">
        <canvas id="gameCanvas" width="360" height="360"></canvas>
      </div>
    </section>

    <section class="card">
      <div class="actions">
        <button class="action-btn start" id="startBtn">Start</button>
        <button class="action-btn pause" id="pauseBtn">Pause</button>
        <button class="action-btn reset" id="resetBtn">Restart</button>
      </div>
    </section>

    <section class="card">
      <div class="controls-grid">
        <div class="ctrl-empty">.</div>
        <button class="ctrl-btn" data-dir="up">▲</button>
        <div class="ctrl-empty">.</div>
        <button class="ctrl-btn" data-dir="left">◀</button>
        <button class="ctrl-btn" data-dir="down">▼</button>
        <button class="ctrl-btn" data-dir="right">▶</button>
      </div>
    </section>

    <p class="footer-note">Score is shown at the end.</p>
  </div>

  <script>
    const GRID_SIZE = 10;
    const SPEED = 280;
    const BAIT_COLORS = ['#16a34a','#dc2626','#2563eb','#d97706'];

    const QUESTIONS = [
      {q:'Cyber stalking?', o:['Harass','Track','Copy','Block'], a:'Harass'},
      {q:'Phishing use?', o:['Steal','Speed','Fix','Encrypt'], a:'Steal'},
      {q:'Piracy?', o:['Legal','Copy','Install','Encrypt'], a:'Copy'},
      {q:'Hacking?', o:['Access','Mail','Delete','Browse'], a:'Access'},
      {q:'Spamming?', o:['Bulk msg','Encrypt','Block','Repair'], a:'Bulk msg'},
      {q:'DoS attack?', o:['Crash','Improve','Secure','Backup'], a:'Crash'},
      {q:'Salami attack?', o:['Small cuts','Big theft','Mail','Hack'], a:'Small cuts'},
      {q:'Data diddling?', o:['Change','Delete','Encrypt','Spam'], a:'Change'},
      {q:'Spoofing?', o:['Fake id','Block','Delete','Encrypt'], a:'Fake id'},
      {q:'Auction fraud?', o:['Fake sale','Safe','Secure','Fast'], a:'Fake sale'},
      {q:'Cyber squatting?', o:['Domain','Hack','Spam','Block'], a:'Domain'},
      {q:'Malware?', o:['Harm','Help','Fix','Scan'], a:'Harm'},
      {q:'Ransomware?', o:['Demand','Share','Delete','Hide'], a:'Demand'},
      {q:'Identity theft?', o:['Impersonate','Scan','Block','Fix'], a:'Impersonate'},
      {q:'Keylogger?', o:['Record','Delete','Encrypt','Scan'], a:'Record'},
      {q:'Trojan?', o:['Hidden','Fast','Clean','Block'], a:'Hidden'},
      {q:'Worm?', o:['Spread','Stop','Scan','Fix'], a:'Spread'},
      {q:'Virus?', o:['Infect','Clean','Block','Delete'], a:'Infect'},
      {q:'Firewall?', o:['Filter','Hack','Copy','Spam'], a:'Filter'},
      {q:'Encryption?', o:['Secure','Delete','Track','Block'], a:'Secure'}
    ];

    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const questionText = document.getElementById('questionText');
    const feedbackBox = document.getElementById('feedbackBox');
    const progressLine = document.getElementById('progressLine');

    let CELL;
    let snake, dir, nextDir, baits, current, idx, running, timer, score=0, correct=0;

    function resize(){
      const size = Math.min(window.innerWidth-20,420);
      canvas.width=size; canvas.height=size;
      CELL=size/GRID_SIZE;
      draw();
    }

    function start(){
      reset(); running=true;
      nextQ();
      timer=setInterval(step,SPEED);
    }

    function reset(){
      snake=[{x:4,y:4}]; dir={x:1,y:0}; nextDir={x:1,y:0};
      idx=0; score=0; correct=0;
    }

    function nextQ(){
      current=QUESTIONS[idx++ % QUESTIONS.length];
      questionText.textContent=current.q;
      progressLine.textContent=`Q ${idx}`;
      placeBaits();
    }

    function placeBaits(){
      baits=[];
      const used=new Set();
      current.o.forEach((opt,i)=>{
        let x,y;
        do{ x=Math.floor(Math.random()*GRID_SIZE); y=Math.floor(Math.random()*GRID_SIZE);}while(used.has(x+','+y));
        used.add(x+','+y);
        baits.push({x,y,opt,correct:opt===current.a,color:BAIT_COLORS[i],label:String.fromCharCode(65+i)});
      });
    }

    function step(){
      dir=nextDir;
      let head={x:snake[0].x+dir.x,y:snake[0].y+dir.y};
      if(head.x<0) head.x=GRID_SIZE-1;
      if(head.x>=GRID_SIZE) head.x=0;
      if(head.y<0) head.y=GRID_SIZE-1;
      if(head.y>=GRID_SIZE) head.y=0;

      const hit=baits.find(b=>b.x===head.x && b.y===head.y);
      if(hit){
        if(hit.correct){
          snake.unshift(head);
          score+=10; correct++;
          feedback('correct','Correct');
          nextQ();
        }else{
          feedback('wrong','Try again');
        }
        draw(); return;
      }

      snake.unshift(head);
      snake.pop();
      draw();
    }

    function feedback(type,text){
      feedbackBox.className='feedback-box '+type;
      feedbackBox.textContent=text;
    }

    function draw(){
      ctx.clearRect(0,0,canvas.width,canvas.height);

      baits&&baits.forEach(b=>{
        ctx.fillStyle=b.color;
        ctx.fillRect(b.x*CELL,b.y*CELL,CELL,CELL);

        ctx.fillStyle='white';
        ctx.font=`bold ${CELL*0.3}px Arial`;
        ctx.textAlign='center';
        ctx.fillText(b.label,b.x*CELL+CELL/2,b.y*CELL+CELL/2-4);

        ctx.font=`${CELL*0.22}px Arial`;
        ctx.fillText(b.opt,b.x*CELL+CELL/2,b.y*CELL+CELL/2+10);
      });

      snake&&snake.forEach((s,i)=>{
        ctx.fillStyle=i===0?'#38bdf8':'#60a5fa';
        ctx.fillRect(s.x*CELL,s.y*CELL,CELL,CELL);
      });
    }

    function change(d){
      const m={up:{x:0,y:-1},down:{x:0,y:1},left:{x:-1,y:0},right:{x:1,y:0}};
      nextDir=m[d];
    }

    document.querySelectorAll('.ctrl-btn').forEach(b=>{
      b.onclick=()=>change(b.dataset.dir);
      b.ontouchstart=e=>{e.preventDefault();change(b.dataset.dir)};
    });

    document.getElementById('startBtn').onclick=start;
    document.getElementById('resetBtn').onclick=reset;
    document.getElementById('pauseBtn').onclick=()=>{running=!running};

    canvas.ontouchstart=e=>{e.preventDefault();};

    window.addEventListener('resize',resize);
    resize();
  </script>
</body>
</html>
